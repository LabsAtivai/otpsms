# /etc/nginx/sites-available/otp-system
# Coloque este arquivo no VPS e habilite com:
# sudo ln -s /etc/nginx/sites-available/otp-system /etc/nginx/sites-enabled/
# sudo certbot --nginx -d otp.suaempresa.com.br

server {
    listen 80;
    server_name otp.suaempresa.com.br;

    # Redirecionar para HTTPS (após certbot configurar)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name otp.suaempresa.com.br;

    # Certificados SSL (gerados pelo certbot)
    ssl_certificate /etc/letsencrypt/live/otp.suaempresa.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otp.suaempresa.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Frontend ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # ── API ──────────────────────────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
